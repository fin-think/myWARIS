<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daftar Ahli Baru</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f4f4f4; display: flex; justify-content: center; padding: 50px; }
        .kad { background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); width: 100%; max-width: 350px; }
        h2 { text-align: center; color: #333; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #28a745; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 16px; }
        button:hover { background: #218838; }
        #mesej { text-align: center; margin-top: 15px; font-weight: bold; }
    </style>
</head>
<body>

<div class="kad">
    <h2>Sign Up</h2>
    <input type="email" id="email" placeholder="Masukkan Emel" required>
    <input type="password" id="pw1" placeholder="Rekaan Password" required>
    <input type="password" id="pw2" placeholder="Sahkan Password" required>
    <button onclick="prosesDaftar()">Daftar Sekarang</button>
    <div id="mesej"></div>
</div>

<script>
    function prosesDaftar() {
        // GANTI URL DI BAWAH DENGAN WEB APP URL ANDA TADI
        const scriptURL = "MASUKKAN_WEB_APP_URL_ANDA_DI_SINI";
        
        const email = document.getElementById('email').value;
        const pw1 = document.getElementById('pw1').value;
        const pw2 = document.getElementById('pw2').value;
        const mesej = document.getElementById('mesej');

        // 1. Sahkan Password (Mesti sama)
        if (pw1 !== pw2) {
            mesej.innerText = "Ralat: Password tidak sepadan!";
            mesej.style.color = "red";
            return;
        }

        if (email === "" || pw1 === "") {
            mesej.innerText = "Sila isi semua ruangan.";
            mesej.style.color = "orange";
            return;
        }

        mesej.innerText = "Sedang mendaftar...";
        mesej.style.color = "blue";

        // 2. Hantar data ke Google Sheets
        fetch(scriptURL, {
            method: 'POST',
            mode: 'no-cors', 
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email: email, password: pw1 })
        })
        .then(() => {
            mesej.innerText = "Berjaya! Sila semak Google Sheets anda.";
            mesej.style.color = "green";
            // Kosongkan kotak input
            document.getElementById('email').value = "";
            document.getElementById('pw1').value = "";
            document.getElementById('pw2').value = "";
        })
        .catch(error => {
            mesej.innerText = "Ralat teknikal: " + error.message;
            mesej.style.color = "red";
        });
    }
</script>

</body>
</html>
